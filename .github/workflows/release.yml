name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    name: Quality Check
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check VERSION change
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git tag --list "${TAG}" | grep -q "${TAG}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists. Skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version: ${VERSION}"
          fi

      - name: Setup Deno
        if: steps.version.outputs.skip == 'false'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install esbuild
        if: steps.version.outputs.skip == 'false'
        env:
          ESBUILD_VERSION: "0.25.4"
        run: |
          curl -fsSL "https://github.com/evanw/esbuild/releases/download/v${ESBUILD_VERSION}/esbuild-linux-x64.zip" -o esbuild.zip
          unzip esbuild.zip
          chmod +x esbuild
          sudo mv esbuild /usr/local/bin/esbuild
          esbuild --version

      - name: Build TypeScript
        if: steps.version.outputs.skip == 'false'
        run: deno task build

      - name: Create release ZIP
        if: steps.version.outputs.skip == 'false'
        run: |
          ZIP_NAME="adlaire-${{ steps.version.outputs.version }}.zip"

          zip -r "${ZIP_NAME}" \
            index.php \
            bundle-installer.php \
            .htaccess \
            VERSION \
            release-manifest.json \
            README.md \
            Core/ \
            js/ \
            themes/ \
            data/lang/ \
            Licenses/ \
            -x "Core/.htaccess" \
            || true

          # Core/.htaccess を個別追加（除外パターンの回避）
          zip "${ZIP_NAME}" Core/.htaccess

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${ZIP_NAME}"
          unzip -l "${ZIP_NAME}" | tail -5

      - name: Create Git tag
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Adlaire Ver.${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload release artifact
        if: steps.version.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}
          path: ${{ env.zip_name }}
          retention-days: 90
