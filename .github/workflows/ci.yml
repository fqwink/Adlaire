name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ts-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adlaire-cms
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task check

  php-static-analysis:
    name: PHP Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adlaire-cms
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpstan
      - run: phpstan analyse --configuration=phpstan.neon --no-progress
