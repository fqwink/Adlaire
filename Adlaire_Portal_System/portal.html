<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adlaireポータル</title>
<script src="data.js"></script>
<style>
  :root {
    --primary: #00a968; --primary-light: #e0f7ed; --primary-dark: #008754;
    --bg: #f4f8fa; --text: #444; --card-bg: #ffffff; --sidebar-w: 260px;
    --shadow: 0 4px 6px rgba(0,0,0,0.05); --radius: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #2d3436; --text: #dfe6e9; --card-bg: #353b48; --shadow: 0 4px 6px rgba(0,0,0,0.3); }
  }
  
  body { font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
  a { text-decoration: none; -webkit-tap-highlight-color: transparent; }
  .layout { display: flex; min-height: 100vh; }
  
  /* サイドバー */
  .sidebar {
    width: var(--sidebar-w); background: var(--card-bg); position: fixed; height: 100vh; overflow-y: auto;
    border-right: 1px solid rgba(0,0,0,0.05); padding: 25px 20px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column;
  }
  .logo { color: var(--primary); font-size: 24px; font-weight: 800; margin: 0 0 5px 0; display: flex; align-items: center; gap: 10px; letter-spacing: 0.05em; }
  .logo-icon { font-size: 28px; }
  .date-label { font-size: 11px; opacity: 0.5; font-weight: bold; margin-bottom: 30px; }
  .nav-menu { list-style: none; padding: 0; margin: 0; flex: 1; }
  .nav-item { margin-bottom: 8px; }
  .nav-link {
    display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-radius: 12px;
    color: var(--text); font-weight: bold; transition: 0.2s; font-size: 14px;
  }
  .nav-link:hover { background: var(--primary-light); color: var(--primary-dark); transform: translateX(5px); }
  .nav-count { font-size: 10px; opacity: 0.6; background: rgba(0,0,0,0.05); padding: 3px 8px; border-radius: 20px; }

  /* メインエリア */
  .main { flex: 1; padding: 40px 60px; margin-left: var(--sidebar-w); max-width: 1200px; }

  /* お知らせエリア */
  .news-box {
    background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 40px;
    overflow: hidden; border: 1px solid rgba(0,0,0,0.05); display: none;
  }
  .news-header {
    background: var(--primary-light); color: var(--primary-dark); padding: 10px 20px;
    font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .news-list {
    max-height: 120px;
    overflow-y: auto; 
    padding: 0; margin: 0; list-style: none;
  }
  .news-list::-webkit-scrollbar { width: 6px; }
  .news-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  .news-item {
    padding: 12px 20px; border-bottom: 1px dashed rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: baseline; font-size: 14px;
  }
  .news-item:last-child { border-bottom: none; }
  .news-date { font-weight: bold; color: var(--primary); font-size: 12px; white-space: nowrap; font-family: monospace; }
  .news-text { line-height: 1.5; }

  /* 検索ボックス */
  .search-wrap { position: relative; margin-bottom: 50px; }
  .search-box {
    width: 100%; padding: 18px 25px; font-size: 16px; border: 2px solid transparent; border-radius: 50px;
    outline: none; box-shadow: var(--shadow); box-sizing: border-box; background: var(--card-bg); color: var(--text);
    transition: all 0.3s;
  }
  .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 5px var(--primary-light); }

  /* カテゴリ & カード */
  .category-section { margin-bottom: 60px; scroll-margin-top: 20px; }
  .category-header { display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,0.05); }
  .category-title { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
  .card {
    background: var(--card-bg); color: var(--text); border-radius: var(--radius); padding: 25px 20px;
    display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center;
    box-shadow: var(--shadow); transition: all 0.25s; border: 1px solid transparent; height: 100%; box-sizing: border-box;
  }
  .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
  .card-icon { font-size: 42px; margin-bottom: 15px; line-height: 1; }
  .card-name { font-weight: bold; font-size: 15px; line-height: 1.4; }

  .footer { margin-top: 80px; font-size: 12px; color: #999; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 30px; }
  .footer a { color: var(--primary); font-weight: bold; }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; height: auto; position: sticky; top: 0; padding: 12px 20px; border-right: none;
      border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: row; align-items: center; gap: 20px;
      overflow-x: auto; white-space: nowrap;
    }
    .logo { font-size: 18px; margin: 0; flex-shrink: 0; }
    .date-label { display: none; }
    .nav-menu { display: flex; gap: 10px; margin: 0; }
    .nav-link { padding: 8px 16px; background: rgba(0,0,0,0.05); font-size: 13px; border-radius: 20px; }
    .nav-count { display: none; }
    .main { margin-left: 0; padding: 30px 20px; width: 100%; box-sizing: border-box; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
    .card { padding: 20px 10px; }
  }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div><div class="logo"><span class="logo-icon">🚀</span><span id="sidebar-title">Adlaire Portal</span></div><div class="date-label" id="today-date"></div></div>
    <nav><ul class="nav-menu" id="nav-list"></ul></nav>
  </aside>

  <main class="main">
    <div id="news-area" class="news-box">
      <div class="news-header">🔔 お知らせ</div>
      <ul class="news-list" id="news-list"></ul>
    </div>
    
    <div class="search-wrap"><input type="text" id="search-input" class="search-box" placeholder="🔍  メニューを検索..."></div>
    <div id="content-area"></div>
    <div class="footer">Powered by <strong>Adlaire Portal System</strong> v1.1</div>
  </main>
</div>

<script>
  function hexToRgb(hex) {
    let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
  }

  window.renderPortal = function(config) {
    if (!config) return;
    if (config.themeColor) {
      document.documentElement.style.setProperty('--primary', config.themeColor);
      const rgb = hexToRgb(config.themeColor);
      if(rgb) {
        document.documentElement.style.setProperty('--primary-light', `rgba(${rgb}, 0.1)`);
        const [r, g, b] = rgb.split(', ').map(Number);
        const darkR = Math.max(0, r - 30);
        const darkG = Math.max(0, g - 30);
        const darkB = Math.max(0, b - 30);
        document.documentElement.style.setProperty('--primary-dark', `rgb(${darkR}, ${darkG}, ${darkB})`);
      }
    }

    document.getElementById('sidebar-title').textContent = config.title;
    const now = new Date();
    document.getElementById('today-date').textContent = `${now.getFullYear()}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')}`;

    const newsArea = document.getElementById('news-area');
    const newsList = document.getElementById('news-list');
    newsList.innerHTML = '';
    
    let newsItems = [];
    if (Array.isArray(config.news)) {
      newsItems = config.news;
    } else if (config.news) {
      newsItems = [{ date: "News", text: config.news }];
    }

    if(newsItems.length > 0) {
      newsArea.style.display = 'block';
      newsItems.forEach(item => {
        const li = document.createElement('li');
        li.className = 'news-item';
        li.innerHTML = `<span class="news-date">${escapeHtml(item.date)}</span><span class="news-text">${escapeHtml(item.text)}</span>`;
        newsList.appendChild(li);
      });
    } else {
      newsArea.style.display = 'none';
    }

    const navList = document.getElementById('nav-list');
    const contentArea = document.getElementById('content-area');
    navList.innerHTML = '';
    contentArea.innerHTML = '';

    config.categories.forEach((cat, idx) => {
      const navLi = document.createElement('li');
      navLi.className = 'nav-item';
      navLi.innerHTML = `<a href="#cat-${idx}" class="nav-link"><span>${escapeHtml(cat.name)}</span><span class="nav-count">${cat.links.length}</span></a>`;
      navList.appendChild(navLi);

      const section = document.createElement('div');
      section.className = 'category-section search-target';
      section.id = `cat-${idx}`;
      section.innerHTML = `<div class="category-header"><h2 class="category-title">${escapeHtml(cat.name)}</h2></div>`;
      
      const grid = document.createElement('div');
      grid.className = 'grid';
      cat.links.forEach(link => {
        const a = document.createElement('a');
        a.href = sanitizeUrl(link.url);
        a.className = 'card search-item';
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.dataset.search = (link.name + cat.name).toLowerCase();
        a.innerHTML = `<span class="card-icon">${escapeHtml(link.icon)}</span><span class="card-name">${escapeHtml(link.name)}</span>`;
        grid.appendChild(a);
      });
      section.appendChild(grid);
      contentArea.appendChild(section);
    });

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  };

  // XSS対策: HTMLエスケープ
  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text).replace(/[&<>"']/g, m => map[m]);
  }

  // URL検証
  function sanitizeUrl(url) {
    if (!url) return '#';
    const urlStr = String(url).trim();
    if (urlStr.match(/^https?:\/\//i)) return urlStr;
    if (urlStr.match(/^\//) || urlStr.match(/^\./)) return urlStr;
    return '#';
  }

  document.getElementById('search-input').addEventListener('keyup', (e) => {
    const term = e.target.value.toLowerCase();
    
    if (term === '') {
      // 検索ボックスが空の場合はすべて表示
      document.querySelectorAll('.search-item').forEach(item => {
        item.style.display = 'flex';
      });
      document.querySelectorAll('.category-section').forEach(sec => {
        sec.style.display = 'block';
      });
    } else {
      // 検索キーワードがある場合はフィルタリング
      document.querySelectorAll('.search-item').forEach(item => {
        item.style.display = item.dataset.search.includes(term) ? 'flex' : 'none';
      });
      document.querySelectorAll('.category-section').forEach(sec => {
        const visibleCount = sec.querySelectorAll('.search-item[style="display: flex;"]').length;
        sec.style.display = visibleCount > 0 ? 'block' : 'none';
      });
    }
  });

  // LocalStorage管理機能
  const STORAGE_KEY = 'adlaire_portal_config';
  const STORAGE_VERSION = '1.1';

  function loadConfig() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const data = JSON.parse(stored);
        console.log('✅ LocalStorageから設定を読み込みました');
        return data.config;
      }
    } catch (error) {
      console.warn('⚠️ LocalStorageの読み込みに失敗しました:', error);
    }
    
    // LocalStorageにデータがない場合はdata.jsから読み込む
    if (typeof PORTAL_CONFIG !== 'undefined') {
      console.log('📄 data.jsから設定を読み込みました');
      return PORTAL_CONFIG;
    }
    
    return null;
  }

  // 設定を読み込んで表示
  const config = loadConfig();
  if (config) {
    window.renderPortal(config);
  } else {
    console.error('❌ 設定データが見つかりません');
  }
</script>
</body>
</html>
