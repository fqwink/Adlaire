# Adlaire Deploy — Webhook デプロイテンプレート
# 仕様: DEPLOY_PLATFORM_RULEBOOK.md P14.4
#
# このファイルを管理対象プロジェクトの .github/workflows/ にコピーして使用する。
#
# GitHub Secrets 必須:
#   DEPLOY_WEBHOOK_URL: https://deploy.example.com/api/webhook/{project-id}
#   DEPLOY_WEBHOOK_SECRET: Webhook 署名用シークレット

name: Deploy via Adlaire Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy Webhook
        run: |
          PAYLOAD='{"ref":"${{ github.ref }}","after":"${{ github.sha }}","pusher":{"name":"${{ github.actor }}"}}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" -hex | awk '{print $2}')
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
