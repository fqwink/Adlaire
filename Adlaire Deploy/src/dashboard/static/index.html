<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adlaire Deploy - Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333}
.header{background:#1e293b;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.1em;font-weight:600}
.header nav a{color:#93c5fd;text-decoration:none;margin-left:16px;font-size:.9em}
.header nav a:hover{color:#fff}
.header .logout{color:#f87171;cursor:pointer;background:none;border:none;font-size:.9em}
.container{max-width:1200px;margin:24px auto;padding:0 24px}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid #eee;font-weight:600;font-size:.95em;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:.9em}
th{color:#666;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.8em;font-weight:600}
.badge-running{background:#dcfce7;color:#166534}
.badge-stopped{background:#f3f4f6;color:#4b5563}
.badge-failed{background:#fee2e2;color:#991b1b}
.badge-starting{background:#fef3c7;color:#92400e}
.btn{padding:4px 10px;border:1px solid #ddd;border-radius:3px;background:#fff;cursor:pointer;font-size:.8em}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
.btn-danger:hover{background:#b91c1c}
.project-link{color:#2563eb;text-decoration:none}
.project-link:hover{text-decoration:underline}
.refresh-btn{font-size:.8em;cursor:pointer;background:none;border:1px solid #ddd;border-radius:3px;padding:4px 10px}
</style>
</head>
<body>
<div class="header">
  <h1>Adlaire Deploy</h1>
  <nav>
    <a href="/dashboard">Projects</a>
    <a href="/dashboard/cluster">Cluster</a>
    <button class="logout" onclick="logout()">Logout</button>
  </nav>
</div>
<div class="container">
  <div class="card">
    <div class="card-header">
      <span>Projects</span>
      <button class="refresh-btn" onclick="loadProjects()">Refresh</button>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>ID</th><th>Hostname</th><th>Port</th><th>State</th><th>Deploy</th><th>Actions</th></tr></thead>
        <tbody id="projects"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function badge(state){
  var cls={"running":"running","stopped":"stopped","failed":"failed","starting":"starting"}[state]||"stopped";
  return '<span class="badge badge-'+cls+'">'+esc(state)+'</span>';
}
async function api(path,method,body){
  var opts={method:method||"GET",headers:{}};
  if(body){opts.headers["Content-Type"]="application/json";opts.headers["X-Requested-With"]="XMLHttpRequest";opts.body=JSON.stringify(body)}
  if(method&&method!=="GET")opts.headers["X-Requested-With"]="XMLHttpRequest";
  var r=await fetch(path,opts);
  if(r.status===401){location.href="/dashboard/login";return null}
  return r.json();
}
async function loadProjects(){
  var r=await api("/dashboard/api/projects");
  if(!r||!r.ok)return;
  var tb=document.getElementById("projects");
  tb.innerHTML=r.data.map(function(p){
    return '<tr><td><a class="project-link" href="/dashboard/projects/'+esc(p.id)+'">'+esc(p.id)+'</a></td>'
      +'<td>'+esc(p.hostname)+'</td><td>'+p.port+'</td><td>'+badge(p.state)+'</td>'
      +'<td>'+esc(p.deploy_state)+'</td>'
      +'<td>'
      +(p.state==="running"?'<button class="btn" onclick="action(\''+p.id+'\',\'stop\')">Stop</button> <button class="btn" onclick="action(\''+p.id+'\',\'restart\')">Restart</button>':'<button class="btn btn-primary" onclick="action(\''+p.id+'\',\'start\')">Start</button>')
      +'</td></tr>';
  }).join("");
}
async function action(id,act){
  await api("/dashboard/api/projects/"+id+"/"+act,"POST");
  setTimeout(loadProjects,500);
}
async function logout(){
  await api("/dashboard/auth/logout","POST");
  location.href="/dashboard/login";
}
loadProjects();
setInterval(loadProjects,10000);
</script>
</body>
</html>
